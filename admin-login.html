<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>МСК — Вход в админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: #fff;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-left: 6px solid #f7c948;
        }
        .login-container h1 {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-container h1 span { background: #f7c948; padding: 0 10px; border-radius: 4px; }
        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .login-container .form-group {
            margin-bottom: 20px;
        }
        .login-container label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }
        .login-container input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        .login-container input:focus {
            border-color: #f7c948;
            outline: none;
            box-shadow: 0 0 0 4px rgba(247, 201, 72, 0.1);
        }
        .login-container .btn-login {
            width: 100%;
            padding: 14px;
            background: #f7c948;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-container .btn-login:hover { background: #e0b03a; }
        .login-container .error-msg {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .login-container .footer {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 13px;
        }
        @media (max-width: 480px) {
            .login-container { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>МСК<span>Знак</span></h1>
        <div class="subtitle">Вход в админ-панель</div>
        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="passwordInput" placeholder="Введите пароль..." required />
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-lock"></i> Войти</button>
            <div id="errorMsg" class="error-msg">❌ Неверный пароль</div>
        </form>
        <div class="footer">© 2026 МСК. Все права защищены.</div>
    </div>

    <script>
        // ===== СТАТИЧЕСКИЙ ПАРОЛЬ (можно изменить) =====
        const ADMIN_PASSWORD = 'admin123';

        function login(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');

            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        }

        if (sessionStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
