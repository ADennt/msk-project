<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Аренда спецтехники</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="cart.js"></script>
    <script src="rental.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Шапка (общая) -->
    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <span id="topbarAuth"></span>
            </span>
        </div>
    </div>
    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <nav class="nav-links">
    <a href="index.html">Главная</a>
    <a href="catalog.html">Каталог Знаков</a>
    <a href="catalog-rental.html">Аренда Техники</a>   <!-- ← добавить -->
    <a href="about.html">О нас</a>
</nav>
            <div class="search-form">
                <input type="text" placeholder="Поиск техники..." id="rentalSearch" onkeypress="if(event.key==='Enter') searchRental()" />
                <button onclick="searchRental()"><i class="fas fa-search"></i></button>
            </div>
            <button class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i> Корзина
                <span class="badge" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- Панель категорий техники -->
    <nav class="nav-categories" id="rentalCategories">
        <button class="active" data-category="all">Вся техника</button>
        <button data-category="Экскаваторы">Экскаваторы</button>
        <button data-category="Погрузчики">Погрузчики</button>
        <button data-category="Краны">Краны</button>
        <button data-category="Бульдозеры">Бульдозеры</button>
        <button data-category="Самосвалы">Самосвалы</button>
    </nav>

    <div class="container">
        <div class="catalog-header">
            <h2><i class="fas fa-tractor"></i> Аренда спецтехники</h2>
            <span id="catalogInfo" style="font-weight:600;color:#888;">Всего: 0 единиц</span>
        </div>
        <div class="catalog-grid" id="equipmentGrid"></div>
        <div class="pagination-container" id="pagination"></div>
    </div>

    <!-- Корзина -->
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-panel">
            <h2>🛒 Корзина <button onclick="toggleCart()">&times;</button></h2>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
            <div class="cart-actions">
                <button class="btn-checkout" onclick="showCheckoutForm()">Оформить заказ</button>
                <button class="btn-clear" onclick="clearCart()" id="clearCartBtn">Очистить</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/..." target="_blank">Лихачевский пр-д, 31, Долгопрудный</a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof loadRentalCatalog === 'function') loadRentalCatalog();
            // Обработчики категорий
            document.querySelectorAll('#rentalCategories button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#rentalCategories button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    if (typeof filterRentalCatalog === 'function') {
                        filterRentalCatalog(this.dataset.category);
                    }
                });
            });
        });
    </script>
</body>
</html>
