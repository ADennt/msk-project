<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Товар</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script> 
    <script src="firebase-config.js"></script>
    <script src="cart.js"></script>
    <script src="auth.js"></script>
</head>
<body>

    <!-- Система тост-уведомлений -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <span id="topbarAuth"></span>
            </span>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="about.html">О нас</a>
            </nav>
            <div class="search-form search-hidden">
                <input type="text" placeholder="Поиск..." disabled />
                <button disabled><i class="fas fa-search"></i></button>
            </div>
            <button class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i> Корзина
                <span class="badge" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <div class="product-wrapper">
        <div class="product-detail" id="productDetail">
            <!-- Рендерится через JS -->
        </div>
    </div>

    <!-- Корзина -->
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-panel">
            <h2>
                🛒 Корзина
                <button onclick="toggleCart()">&times;</button>
            </h2>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
            <div class="cart-actions">
                <button class="btn-checkout" onclick="showCheckoutForm()">Оформить заказ</button>
                <button class="btn-clear" onclick="clearCart()" id="clearCartBtn">Очистить</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/%D0%9B%D0%B8%D1%85%D0%B0%D1%87%D0%B5%D0%B2%D1%81%D0%BA%D0%B8%D0%B9+%D0%BF%D1%80-%D0%B4,+31,+%D0%94%D0%BE%D0%BB%D0%B3%D0%BE%D0%BF%D1%80%D1%83%D0%B4%D0%BD%D1%8B%D0%B9,+%D0%9C%D0%BE%D1%81%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B0%D1%8F+%D0%BE%D0%B1%D0%BB.,+141701/@55.9182665,37.499657,17z/data=!3m1!4b1!4m6!3m5!1s0x46b5399ee67aeacd:0x290b6d9cde281a1e!8m2!3d55.9183677!4d37.4995338!16s%2Fg%2F11h7dycp_p?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D"
                   target="_blank" rel="noopener noreferrer" style="color:#f7c948;text-decoration:none;">
                    Лихачевский пр-д, 31, Долгопрудный, Московская обл., 141701
                </a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <script src="product.js"></script>
</body>
</html>
