<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Товар</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <a href="#" id="chatToggle"><i class="fab fa-whatsapp"></i> Написать</a>
                <a href="login.html" style="margin-left:10px;"><i class="fas fa-cog"></i> Админ</a>
            </span>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <div class="search-form">
                <input type="text" placeholder="Поиск..." />
                <button><i class="fas fa-search"></i></button>
            </div>
            <button class="cart-icon" onclick="location.href='index.html'">
                <i class="fas fa-shopping-cart"></i> Корзина
                <span class="badge" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <div class="container" style="margin: 30px 0 60px;">
        <div class="product-detail" id="productDetail">
            <!-- Рендерится через JS -->
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div><i class="fas fa-map-pin"></i> Москва, Дорожный пр-д, 7</div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <script src="product.js"></script>
