<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — МСК</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            padding: 40px 0;
        }
        .auth-container {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-left: 6px solid #f7c948;
        }
        .auth-container h1 {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
        }
        .auth-container h1 span { background: #f7c948; padding: 0 10px; border-radius: 4px; }
        .auth-container .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
        }
        .auth-container .form-group {
            margin-bottom: 18px;
        }
        .auth-container label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }
        .auth-container input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        .auth-container input:focus {
            border-color: #f7c948;
            outline: none;
        }
        .auth-container .btn-auth {
            width: 100%;
            padding: 14px;
            background: #f7c948;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
        }
        .auth-container .btn-auth:hover { background: #e0b03a; }
        .auth-container .error-msg {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .auth-container .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .auth-container .footer-links a { color: #f7c948; text-decoration: none; font-weight: 600; }
        .auth-container .footer-links a:hover { text-decoration: underline; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</head>
<body>

    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <a href="#" id="chatToggle"><i class="fab fa-whatsapp"></i> Написать</a>
            </span>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="about.html">О нас</a>
            </nav>
            <div>
                <a href="login.html" style="color:#1e1e1e;text-decoration:none;font-weight:600;margin-right:15px;">Войти</a>
            </div>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-container">
            <h1>МСК<span>Знак</span></h1>
            <div class="subtitle">Создайте аккаунт</div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="example@mail.ru" required />
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required />
                </div>
                <button type="submit" class="btn-auth">Зарегистрироваться</button>
                <div id="regError" class="error-msg"></div>
            </form>
            <div class="footer-links">
                Уже есть аккаунт? <a href="login.html">Войти</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/%D0%9B%D0%B8%D1%85%D0%B0%D1%87%D0%B5%D0%B2%D1%81%D0%BA%D0%B8%D0%B9+%D0%BF%D1%80-%D0%B4,+31,+%D0%94%D0%BE%D0%BB%D0%B3%D0%BE%D0%BF%D1%80%D1%83%D0%B4%D0%BD%D1%8B%D0%B9,+%D0%9C%D0%BE%D1%81%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B0%D1%8F+%D0%BE%D0%B1%D0%BB.,+141701/@55.9182665,37.499657,17z/data=!3m1!4b1!4m6!3m5!1s0x46b5399ee67aeacd:0x290b6d9cde281a1e!8m2!3d55.9183677!4d37.4995338!16s%2Fg%2F11h7dycp_p?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D"
                   target="_blank" rel="noopener noreferrer" style="color:#f7c948;text-decoration:none;">
                    Лихачевский пр-д, 31, Долгопрудный, Московская обл., 141701
                </a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('regError');

            window.signUp(email, password)
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch(err => {
                    errorEl.textContent = err.message;
                    errorEl.style.display = 'block';
                });
        });
    </script>

</body>
</html>
