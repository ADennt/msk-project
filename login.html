<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход в админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-left: 6px solid #f7c948;
        }
        .login-container h1 {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
        }
        .login-container h1 span { background: #f7c948; padding: 0 10px; border-radius: 4px; }
        .login-container .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .login-container input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .login-container input:focus {
            border-color: #f7c948;
            outline: none;
        }
        .login-container button {
            width: 100%;
            padding: 14px;
            background: #f7c948;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
        }
        .login-container button:hover { background: #e0b03a; }
        .login-container .error {
            color: #d32f2f;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>МСК<span>Знак</span></h1>
        <div class="subtitle">Вход в админ-панель</div>
        <form onsubmit="login(event)">
            <input type="password" id="passwordInput" placeholder="Введите пароль..." required />
            <button type="submit"><i class="fas fa-lock"></i> Войти</button>
            <div id="errorMsg" class="error">❌ Неверный пароль</div>
        </form>
    </div>

    <script>
        const ADMIN_PASSWORD = 'admin123';

        function login(e) {
            e.preventDefault();
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 3000);
            }
        }

        if (sessionStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
