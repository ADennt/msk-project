<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    
    <!-- Firebase (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="cart.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
    <script src="admin-notifications.js"></script>
</head>
<body>

    <!-- ✅ Верхняя планка (topbar) добавлена -->
    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <span id="topbarAuth"></span>
            </span>
        </div>
    </div>

    <header class="header" style="position: relative;">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <h2 style="color:#f7c948;"><i class="fas fa-user-shield"></i> Админ-панель</h2>
            <div style="display:flex;gap:15px;align-items:center;">
                <a href="dashboard.html" class="header-btn"><i class="fas fa-chart-pie"></i> Дашборд</a>
                <a href="orders.html" class="header-btn">Заказы</a>
                <a href="index.html" class="header-btn">На сайт</a>
                <button onclick="logoutUser().then(() => location.href='index.html')" class="header-btn-logout">Выйти</button>
            </div>
        </div>
    </header>

    <script>
        // Проверка прав администратора
        document.addEventListener('DOMContentLoaded', function() {
            window.onAuthStateChanged((user) => {
                if (!user || !window.isAdmin || !window.isAdmin(user)) {
                    window.location.href = 'login.html';
                }
            });
        });
    </script>

    <div class="admin-wrapper">
        <div class="admin-content">
            <div class="admin-actions">
                <button class="btn-admin-add" onclick="showAddForm()"><i class="fas fa-plus"></i> Добавить товар</button>
                <button class="btn-admin-refresh" onclick="loadProducts()"><i class="fas fa-sync"></i> Обновить</button>
                <button class="btn-admin-import" onclick="importData()"><i class="fas fa-file-import"></i> Импорт</button>
                <button class="btn-admin-export" onclick="exportData()"><i class="fas fa-file-export"></i> Экспорт</button>
            </div>

            <div class="admin-form" id="adminForm" style="display:none;">
                <h3 id="formTitle">➕ Добавить товар</h3>
                <input type="hidden" id="editId" />
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Название <span style="color:red;">*</span></label>
                        <input type="text" id="fName" placeholder="2.4 Уступи дорогу" />
                    </div>
                    <div class="form-group">
                        <label>Тип <span style="color:red;">*</span></label>
                        <select id="fType">
                            <option value="warning">Предупреждающий</option>
                            <option value="priority">Приоритета</option>
                            <option value="forbid">Запрещающий</option>
                            <option value="mandatory">Предписывающий</option>
                            <option value="info">Информационный</option>
                            <option value="special">Особых предписаний</option>
                            <option value="service">Сервиса</option>
                            <option value="additional">Дополнительной информации</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Тег</label>
                        <input type="text" id="fTag" placeholder="Хит" />
                    </div>
                    <div class="form-group">
                        <label>В наличии (шт.)</label>
                        <input type="number" id="fStock" value="0" />
                    </div>

                    <div class="form-group full-width variants-group">
                        <label>Варианты (размер, плёнка, цена) <span style="color:red;">*</span></label>
                        <div id="variantsContainer"></div>
                        <button type="button" class="btn-add-variant" onclick="addVariantRow()"><i class="fas fa-plus"></i> Добавить вариант</button>
                    </div>

                    <div class="form-group full-width image-upload-group">
                        <label>Изображение</label>
                        <div class="image-upload-wrapper">
                            <div class="image-preview" id="imagePreview">
                                <i class="fas fa-image"></i>
                                <span>Выберите изображение</span>
                            </div>
                            <input type="file" id="fImage" accept="image/*" />
                            <button type="button" class="btn-upload-image" onclick="document.getElementById('fImage').click()">Выбрать</button>
                            <button type="button" class="btn-remove-image" id="removeImageBtn" style="display:none;" onclick="removeImage()">Удалить</button>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Описание</label>
                        <textarea id="fDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Материал</label>
                        <input type="text" id="fMaterial" placeholder="Оцинкованная сталь" value="Оцинкованная сталь" />
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-save" onclick="saveProduct()"><i class="fas fa-save"></i> Сохранить</button>
                    <button class="btn-cancel" onclick="hideForm()"><i class="fas fa-times"></i> Отмена</button>
                </div>
            </div>

            <div class="admin-table-wrap">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:10px;">
                    <span id="tableInfo" style="font-weight:600;color:#888;">Всего: 0 товаров</span>
                    <div style="display:flex;gap:10px;">
                        <button class="btn-view-order" onclick="sortTable('id')" style="background:#f7c948;border:none;padding:4px 12px;border-radius:20px;font-weight:600;cursor:pointer;">Сортировать по ID</button>
                        <button class="btn-view-order" onclick="sortTable('name')" style="background:#f7c948;border:none;padding:4px 12px;border-radius:20px;font-weight:600;cursor:pointer;">Сортировать по имени</button>
                    </div>
                </div>
                <table class="admin-table" id="adminTable">
                    <thead>
                        <tr><th>ID</th><th>Изображение</th><th>Название</th><th>Тип</th><th>Цена</th><th>В наличии</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
                <div class="pagination-container" id="adminPagination"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/%D0%9B%D0%B8%D1%85%D0%B0%D1%87%D0%B5%D0%B2%D1%81%D0%BA%D0%B8%D0%B9+%D0%BF%D1%80-%D0%B4,+31,+%D0%94%D0%BE%D0%BB%D0%B3%D0%BE%D0%BF%D1%80%D1%83%D0%B4%D0%BD%D1%8B%D0%B9,+%D0%9C%D0%BE%D1%81%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B0%D1%8F+%D0%BE%D0%B1%D0%BB.,+141701/@55.9182665,37.499657,17z/data=!3m1!4b1!4m6!3m5!1s0x46b5399ee67aeacd:0x290b6d9cde281a1e!8m2!3d55.9183677!4d37.4995338!16s%2Fg%2F11h7dycp_p?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D"
                   target="_blank" rel="noopener noreferrer" style="color:#f7c948;text-decoration:none;">
                    Лихачевский пр-д, 31, Долгопрудный, Московская обл., 141701
                </a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Скрипты уже подключены в <head>, но дублируем для уверенности (не обязательно) -->
    <!-- Аутентификация работает через auth.js -->
</body>
</html>
