<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <!-- Проверка авторизации -->
    <script>
        if (sessionStorage.getItem('adminAuth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <header class="header" style="position: relative;">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <h2 style="color:#f7c948;"><i class="fas fa-user-shield"></i> Админ-панель</h2>
            <div style="display:flex;gap:15px;">
                <a href="orders.html" style="color:#f7c948;text-decoration:none;font-weight:700;">Заказы</a>
                <a href="index.html" style="color:#f7c948;text-decoration:none;font-weight:700;">На сайт</a>
                <button onclick="logout()" style="background:#d32f2f;color:#fff;border:none;padding:8px 18px;border-radius:40px;font-weight:700;cursor:pointer;">Выйти</button>
            </div>
        </div>
    </header>

    <div class="admin-wrapper">
        <div class="admin-content">
            <div class="admin-actions">
                <button class="btn-admin-add" onclick="showAddForm()"><i class="fas fa-plus"></i> Добавить товар</button>
                <button class="btn-admin-refresh" onclick="loadProducts()"><i class="fas fa-sync"></i> Обновить</button>
                <button class="btn-admin-import" onclick="importData()"><i class="fas fa-file-import"></i> Импорт</button>
                <button class="btn-admin-export" onclick="exportData()"><i class="fas fa-file-export"></i> Экспорт</button>
            </div>

            <div class="admin-form" id="adminForm" style="display:none;">
                <h3 id="formTitle">➕ Добавить товар</h3>
                <input type="hidden" id="editId" />
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Название <span style="color:red;">*</span></label>
                        <input type="text" id="fName" placeholder="2.4 Уступи дорогу" />
                    </div>
                    <div class="form-group">
                        <label>Тип <span style="color:red;">*</span></label>
                        <select id="fType">
                            <option value="warning">Предупреждающий</option>
                            <option value="forbid">Запрещающий</option>
                            <option value="mandatory">Предписывающий</option>
                            <option value="info">Информационный</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Тег</label>
                        <input type="text" id="fTag" placeholder="Хит" />
                    </div>
                    <div class="form-group">
                        <label>В наличии (шт.)</label>
                        <input type="number" id="fStock" value="0" />
                    </div>

                    <div class="form-group full-width variants-group">
                        <label>Варианты (размер, плёнка, цена) <span style="color:red;">*</span></label>
                        <div id="variantsContainer"></div>
                        <button type="button" class="btn-add-variant" onclick="addVariantRow()"><i class="fas fa-plus"></i> Добавить вариант</button>
                    </div>

                    <div class="form-group full-width image-upload-group">
                        <label>Изображение</label>
                        <div class="image-upload-wrapper">
                            <div class="image-preview" id="imagePreview">
                                <i class="fas fa-image"></i>
                                <span>Выберите изображение</span>
                            </div>
                            <input type="file" id="fImage" accept="image/*" />
                            <button type="button" class="btn-upload-image" onclick="document.getElementById('fImage').click()">Выбрать</button>
                            <button type="button" class="btn-remove-image" id="removeImageBtn" style="display:none;" onclick="removeImage()">Удалить</button>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>Описание</label>
                        <textarea id="fDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Материал</label>
                        <input type="text" id="fMaterial" placeholder="Оцинкованная сталь" value="Оцинкованная сталь" />
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-save" onclick="saveProduct()"><i class="fas fa-save"></i> Сохранить</button>
                    <button class="btn-cancel" onclick="hideForm()"><i class="fas fa-times"></i> Отмена</button>
                </div>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table" id="adminTable">
                    <thead>
                        <tr><th>ID</th><th>Изображение</th><th>Название</th><th>Тип</th><th>Цена</th><th>В наличии</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
