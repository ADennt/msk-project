<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет — МСК</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .profile-page {
            padding: 40px 0;
        }
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .profile-header h1 {
            font-size: 32px;
            font-weight: 800;
        }
        .profile-header h1 span { color: #f7c948; }
        .btn-logout {
            background: #d32f2f;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-logout:hover { background: #b71c1c; }
        .orders-history {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }
        .orders-history h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #1e1e1e;
        }
        .order-card {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .order-card:last-child { border-bottom: none; }
        .order-card .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
        }
        .order-card .order-details {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
        .order-status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            text-transform: capitalize;
        }
        .order-status-badge.new { background: #e3f2fd; color: #0d47a1; }
        .order-status-badge.processing { background: #fff3e0; color: #e65100; }
        .order-status-badge.shipped { background: #e8f5e9; color: #1b5e20; }
        .order-status-badge.delivered { background: #e0f7fa; color: #006064; }
        .order-status-badge.cancelled { background: #ffebee; color: #b71c1c; }
        .no-orders {
            text-align: center;
            padding: 40px 0;
            color: #999;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</head>
<body>

    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <a href="#" id="chatToggle"><i class="fab fa-whatsapp"></i> Написать</a>
                <a href="login.html" style="margin-left:10px;"><i class="fas fa-cog"></i> Админ</a>
            </span>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="about.html">О нас</a>
            </nav>
            <div>
                <span id="userEmailDisplay" style="font-weight:600;color:#555;margin-right:15px;"></span>
            </div>
        </div>
    </header>

    <div class="container profile-page">
        <div class="profile-header">
            <h1>Личный кабинет</h1>
            <button class="btn-logout" onclick="logoutUser()">Выйти</button>
        </div>
        <div class="orders-history" id="ordersHistory">
            <h2>Мои заказы</h2>
            <div id="ordersList"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/%D0%9B%D0%B8%D1%85%D0%B0%D1%87%D0%B5%D0%B2%D1%81%D0%BA%D0%B8%D0%B9+%D0%BF%D1%80-%D0%B4,+31,+%D0%94%D0%BE%D0%BB%D0%B3%D0%BE%D0%BF%D1%80%D1%83%D0%B4%D0%BD%D1%8B%D0%B9,+%D0%9C%D0%BE%D1%81%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B0%D1%8F+%D0%BE%D0%B1%D0%BB.,+141701/@55.9182665,37.499657,17z/data=!3m1!4b1!4m6!3m5!1s0x46b5399ee67aeacd:0x290b6d9cde281a1e!8m2!3d55.9183677!4d37.4995338!16s%2Fg%2F11h7dycp_p?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D"
                   target="_blank" rel="noopener noreferrer" style="color:#f7c948;text-decoration:none;">
                    Лихачевский пр-д, 31, Долгопрудный, Московская обл., 141701
                </a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <script>
        function logoutUser() {
            window.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="no-orders">У вас пока нет заказов</div>';
                return;
            }
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-header">
                        <span>Заказ #${o.id}</span>
                        <span class="order-status-badge ${o.status}">${o.status}</span>
                    </div>
                    <div class="order-details">
                        <div>Дата: ${new Date(o.createdAt).toLocaleString('ru-RU')}</div>
                        <div>Сумма: ${o.total.toLocaleString()} ₽</div>
                        <div>Товаров: ${o.items.length}</div>
                    </div>
                </div>
            `).join('');
        }

        function loadUserOrders(userId) {
            if (!window.database) return;
            window.database.ref('orders').orderByChild('userId').equalTo(userId).on('value', snapshot => {
                const data = snapshot.val() || {};
                const orders = Object.values(data);
                renderOrders(orders);
            });
        }

        function initProfile() {
            const user = window.getCurrentUser();
            if (!user) {
                // Если не авторизован – перенаправляем на вход
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userEmailDisplay').textContent = user.email;
            loadUserOrders(user.uid);
        }

        window.onAuthStateChanged(user => {
            if (user) {
                initProfile();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Если пользователь уже авторизован, но событие не сработало (страница загружена)
        setTimeout(() => {
            if (!window.getCurrentUser()) {
                window.location.href = 'login.html';
            }
        }, 1000);
    </script>
</body>
</html>
