<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Заказы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <script>
        if (sessionStorage.getItem('adminAuth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <header class="header" style="position: relative;">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <h2 style="color:#f7c948;"><i class="fas fa-list"></i> Заказы</h2>
            <div style="display:flex;gap:15px;">
                <a href="admin.html" class="header-btn">Админ</a>
                <button onclick="logout()" class="header-btn-logout">Выйти</button>
            </div>
        </div>
    </header>

    <div class="admin-wrapper">
        <div class="admin-content">
            <div class="admin-actions">
                <button class="btn-admin-refresh" onclick="loadOrders()"><i class="fas fa-sync"></i> Обновить</button>
                
                <div style="display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px;border-radius:40px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <label style="font-weight:700;color:#555;font-size:14px;"><i class="fas fa-filter"></i> Статус:</label>
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="all">Все</option>
                        <option value="новый">Новый</option>
                        <option value="в обработке">В обработке</option>
                        <option value="отправлен">Отправлен</option>
                        <option value="доставлен">Доставлен</option>
                        <option value="отменён">Отменён</option>
                    </select>
                </div>

                <input type="text" id="searchOrders" placeholder="🔍 Поиск (ID, имя, телефон, дата, месяц...)" oninput="applyFilters()" />

                <span style="font-weight:700;color:#888;padding:14px 20px;background:#fff;border-radius:40px;">
                    Найдено: <span id="orderCountNumber">0</span>
                </span>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table" id="ordersTable">
                    <thead>
                        <tr>
                            <th>ID</th><th>Клиент</th><th>Телефон</th><th>Товаров</th>
                            <th>Сумма</th><th>Статус</th><th>Дата</th><th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="order-modal" id="orderModal">
        <div class="order-modal-content">
            <button class="order-modal-close" onclick="closeModal()">&times;</button>
            <div id="orderModalContent"></div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/%D0%9B%D0%B8%D1%85%D0%B0%D1%87%D0%B5%D0%B2%D1%81%D0%BA%D0%B8%D0%B9+%D0%BF%D1%80-%D0%B4,+31,+%D0%94%D0%BE%D0%BB%D0%B3%D0%BE%D0%BF%D1%80%D1%83%D0%B4%D0%BD%D1%8B%D0%B9,+%D0%9C%D0%BE%D1%81%D0%BA%D0%BE%D0%B2%D1%81%D0%BA%D0%B0%D1%8F+%D0%BE%D0%B1%D0%BB.,+141701/@55.9182665,37.499657,17z/data=!3m1!4b1!4m6!3m5!1s0x46b5399ee67aeacd:0x290b6d9cde281a1e!8m2!3d55.9183677!4d37.4995338!16s%2Fg%2F11h7dycp_p?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D"
                   target="_blank" rel="noopener noreferrer" style="color:#f7c948;text-decoration:none;">
                    Лихачевский пр-д, 31, Долгопрудный, Московская обл., 141701
                </a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <script src="orders.js"></script>
</body>
</html>
