<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Заказы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="orders.js"></script>
    <script src="admin-notifications.js"></script>
</head>
<body>
    <!-- ===== TOPBAR ===== -->
    <div class="topbar">
        <div class="container">
            <span><i class="fas fa-truck"></i> Доставка по всей России</span>
            <span>
                <i class="fas fa-phone-alt"></i> 8 (800) 555-22-33
                <span id="topbarAuth"></span>
            </span>
        </div>
    </div>

    <!-- ===== HEADER (шапка) ===== -->
    <header class="header" style="position: relative;">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <h2 style="color:#f7c948; font-size:20px; margin:0;">
                <i class="fas fa-list"></i> Заказы
            </h2>
            <div style="display:flex;gap:15px;align-items:center; flex-wrap:wrap;">
                <a href="dashboard.html" class="header-btn"><i class="fas fa-chart-pie"></i> Дашборд</a>
                <a href="admin.html" class="header-btn"><i class="fas fa-box"></i> Товары</a>
                <a href="admin-equipment.html" class="header-btn"><i class="fas fa-tractor"></i> Техника</a>   <!-- ✅ добавлено -->
                <a href="index.html" class="header-btn">На сайт</a>
                <button onclick="logoutUser().then(() => location.href='index.html')" class="header-btn-logout">Выйти</button>
            </div>
        </div>
    </header>

    <script>
        // Проверка прав администратора
        document.addEventListener('DOMContentLoaded', function() {
            window.onAuthStateChanged((user) => {
                if (!user || !window.isAdmin || !window.isAdmin(user)) {
                    window.location.href = 'login.html';
                }
            });
        });
    </script>

    <div class="admin-wrapper">
        <div class="admin-content">
            <!-- Фильтры и кнопки -->
            <div class="admin-actions">
                <button class="btn-admin-refresh" onclick="loadOrders()"><i class="fas fa-sync"></i> Обновить</button>
                <button class="btn-admin-export" onclick="exportOrdersCSV()" style="background:#2e7d32;color:#fff;"><i class="fas fa-file-csv"></i> Экспорт CSV</button>
                <div style="display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px;border-radius:40px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <label style="font-weight:700;color:#555;font-size:14px;"><i class="fas fa-filter"></i> Статус:</label>
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="all">Все</option>
                        <option value="новый">Новый</option>
                        <option value="в обработке">В обработке</option>
                        <option value="отправлен">Отправлен</option>
                        <option value="доставлен">Доставлен</option>
                        <option value="отменён">Отменён</option>
                    </select>
                </div>
                <input type="text" id="searchOrders" placeholder="🔍 Поиск..." oninput="applyFilters()" style="padding:6px 14px;border:2px solid #ddd;border-radius:30px;font-size:14px;outline:none;" />
            </div>

            <!-- Массовые действия -->
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;align-items:center;">
                <button class="btn-admin-add" onclick="massUpdateStatus()"><i class="fas fa-edit"></i> Сменить статус</button>
                <button class="btn-admin-delete" onclick="massDeleteOrders()"><i class="fas fa-trash"></i> Удалить выбранные</button>
                <span id="selectedCount" style="font-weight:600;color:#888;">Выбрано: 0</span>
            </div>

            <!-- Таблица заказов -->
            <div class="admin-table-wrap">
                <table class="admin-table" id="ordersTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onchange="toggleAllOrders()" /></th>
                            <th>ID</th><th>Клиент</th><th>Телефон</th><th>Товаров</th>
                            <th>Сумма</th><th>Статус</th><th>Дата</th><th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="order-modal" id="orderModal">
        <div class="order-modal-content" id="orderModalContent"></div>
    </div>

    <footer class="footer">
        <div class="container">
            <div>© 2026 МСК. Все права защищены.</div>
            <div>
                <i class="fas fa-map-pin"></i>
                <a href="https://www.google.com/maps/place/..." target="_blank">Лихачевский пр-д, 31, Долгопрудный</a>
            </div>
            <div><a href="#"><i class="fas fa-envelope"></i> info@msk.ru</a></div>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Дополнительная инициализация
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
