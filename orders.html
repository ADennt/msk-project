<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Заказы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <script>
        if (sessionStorage.getItem('adminAuth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <header class="header" style="position: relative;">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <h2 style="color:#f7c948;"><i class="fas fa-list"></i> Заказы</h2>
            <div style="display:flex;gap:15px;">
                <a href="admin.html" style="color:#f7c948;text-decoration:none;font-weight:700;">Админ</a>
                <button onclick="logout()" style="background:#d32f2f;color:#fff;border:none;padding:8px 18px;border-radius:40px;font-weight:700;cursor:pointer;">Выйти</button>
            </div>
        </div>
    </header>

    <div class="admin-wrapper">
        <div class="admin-content">
            <div class="admin-actions">
                <button class="btn-admin-refresh" onclick="loadOrders()"><i class="fas fa-sync"></i> Обновить</button>
                <span style="font-weight:700;color:#888;padding:14px 20px;background:#fff;border-radius:40px;">
                    Всего заказов: <span id="orderCountNumber">0</span>
                </span>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table" id="ordersTable">
                    <thead>
                        <tr>
                            <th>ID</th><th>Клиент</th><th>Телефон</th><th>Товаров</th>
                            <th>Сумма</th><th>Статус</th><th>Дата</th><th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="order-modal" id="orderModal">
        <div class="order-modal-content">
            <button class="order-modal-close" onclick="closeModal()">&times;</button>
            <div id="orderModalContent"></div>
        </div>
    </div>

    <script src="orders.js"></script>
</body>
</html>
