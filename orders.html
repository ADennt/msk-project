<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МСК — Заказы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script> 
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.onAuthStateChanged((user) => {
                if (!user || !window.isAdmin || !window.isAdmin(user)) {
                    window.location.href = 'login.html';
                }
            });
        });
    </script>

    <header class="header" style="position: relative;">
        <div class="container">
            <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
                <i class="fas fa-triangle-exclamation"></i> МСК<span>Знак</span>
            </div>
            <h2 style="color:#f7c948;"><i class="fas fa-list"></i> Заказы</h2>
            <div style="display:flex;gap:15px;align-items:center;">
                <a href="dashboard.html" class="header-btn"><i class="fas fa-chart-pie"></i> Дашборд</a>
                <a href="admin.html" class="header-btn">Админ</a>
                <button onclick="logoutUser().then(() => location.href='index.html')" class="header-btn-logout">Выйти</button>
            </div>
        </div>
    </header>

    <div class="admin-wrapper">
        <div class="admin-content">
            <div class="admin-actions">
                <button class="btn-admin-refresh" onclick="loadOrders()"><i class="fas fa-sync"></i> Обновить</button>
                <button class="btn-admin-export" onclick="exportOrdersCSV()" style="background:#2e7d32;color:#fff;"><i class="fas fa-file-csv"></i> Экспорт CSV</button>
                <div style="display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px;border-radius:40px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <label style="font-weight:700;color:#555;font-size:14px;"><i class="fas fa-filter"></i> Статус:</label>
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="all">Все</option>
                        <option value="новый">Новый</option>
                        <option value="в обработке">В обработке</option>
                        <option value="отправлен">Отправлен</option>
                        <option value="доставлен">Доставлен</option>
                        <option value="отменён">Отменён</option>
                    </select>
                </div>
                <div style="display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px;border-radius:40px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <label style="font-weight:700;color:#555;font-size:14px;">Дата с:</label>
                    <input type="date" id="dateFrom" onchange="applyFilters()" style="border:1px solid #ddd;border-radius:6px;padding:4px;font-size:13px;" />
                    <label style="font-weight:700;color:#555;font-size:14px;">по:</label>
                    <input type="date" id="dateTo" onchange="applyFilters()" style="border:1px solid #ddd;border-radius:6px;padding:4px;font-size:13px;" />
                </div>
                <div style="display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px;border-radius:40px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <label style="font-weight:700;color:#555;font-size:14px;">Сумма от:</label>
                    <input type="number" id="minAmount" placeholder="0" oninput="applyFilters()" style="width:80px;border:1px solid #ddd;border-radius:6px;padding:4px;font-size:13px;" />
                    <label style="font-weight:700;color:#555;font-size:14px;">до:</label>
                    <input type="number" id="maxAmount" placeholder="∞" oninput="applyFilters()" style="width:80px;border:1px solid #ddd;border-radius:6px;padding:4px;font-size:13px;" />
                </div>
                <input type="text" id="searchOrders" placeholder="🔍 Поиск..." oninput="applyFilters()" style="padding:6px 14px;border:2px solid #ddd;border-radius:30px;font-size:14px;outline:none;" />
            </div>

            <!-- Массовые действия -->
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;align-items:center;">
                <button class="btn-admin-add" onclick="massUpdateStatus()"><i class="fas fa-edit"></i> Сменить статус</button>
                <button class="btn-admin-delete" onclick="massDeleteOrders()"><i class="fas fa-trash"></i> Удалить выбранные</button>
                <span id="selectedCount" style="font-weight:600;color:#888;">Выбрано: 0</span>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table" id="ordersTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onchange="toggleAllOrders()" /></th>
                            <th>ID</th><th>Клиент</th><th>Телефон</th><th>Товаров</th>
                            <th>Сумма</th><th>Статус</th><th>Дата</th><th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Модалка просмотра заказа -->
    <div class="order-modal" id="orderModal">...</div>

    <footer class="footer">...</footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<script src="orders.js"></script>
<script src="admin-notifications.js"></script>
</body>
</html>
